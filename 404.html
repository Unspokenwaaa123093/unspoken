<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Kayboldun</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Syne&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      background: #000;
      color: #f5f0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    /* Arka planda hafif bir parazit/noise efekti */
    .noise {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_Graphic.png');
      opacity: 0.03;
      pointer-events: none;
    }

    .container {
      text-align: center;
      z-index: 10;
    }

    h1 {
      font-size: 8rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      margin: 0;
      opacity: 0.8;
      animation: glitch 3s infinite;
    }

    p {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: rgba(245, 240, 232, 0.5);
      margin-top: -10px;
      margin-bottom: 40px;
    }

    .home-link {
      display: inline-block;
      text-decoration: none;
      color: #e8d5b0;
      border: 1px solid rgba(232, 213, 176, 0.3);
      padding: 12px 30px;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      transition: all 0.4s ease;
    }

    .home-link:hover {
      background: #e8d5b0;
      color: #000;
      box-shadow: 0 0 20px rgba(232, 213, 176, 0.2);
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }
  </style>
</head>
<body>

  <div class="noise"></div>

  <div class="container">
    <h1>404</h1>
    <p>Yolunu mu kaybettin?</p>
    <a href="index.html" class="home-link">Işığa Dön</a>
  </div>

</body>
